<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="我的收藏"/>
<title>我的收藏</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--card:#161616;--card2:#1c1c1c;--border:#252525;--border2:#2a2a2a;
  --text:#fff;--muted:#888;--muted2:#555;
  --amber:#FF9500;--amber-bg:#1e1200;
  --green:#30D158;--green-bg:#0a1a0a;
  --blue:#4DA6FF;--blue-bg:#001525;
  --red:#FF453A;--red-bg:#1a0808;
  --purple:#BF5AF2;--purple-bg:#160025;
  --yellow:#FFD60A;--yellow-bg:#1a1500;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Microsoft JhengHei","PingFang TC",sans-serif;overflow:hidden;}
.app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}
.header{padding:16px 20px 10px;display:flex;align-items:center;gap:12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.header-back{color:var(--amber);font-size:16px;cursor:pointer;padding:4px 8px 4px 0;}
.header-title{flex:1;font-size:18px;font-weight:700;}
.header-action{color:var(--amber);font-size:14px;cursor:pointer;}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.bottom-nav{background:var(--card);border-top:0.5px solid var(--border);display:flex;flex-shrink:0;}
.nav-btn{flex:1;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.nav-ico{font-size:18px;line-height:1;}
.nav-lbl{font-size:10px;color:var(--muted);}
.nav-btn.active .nav-lbl{color:var(--amber);}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:0.5px solid var(--border);cursor:pointer;}
.list-item:active{background:var(--card);}
.list-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
.list-body{flex:1;min-width:0;}
.list-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-sub{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.list-arrow{color:var(--muted2);font-size:18px;}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;display:inline-block;white-space:nowrap;}
.tag-loc{background:var(--blue-bg);color:var(--blue);}
.tag-eat{background:var(--amber-bg);color:var(--amber);}
.tag-play{background:var(--green-bg);color:var(--green);}
.tag-buy{background:var(--purple-bg);color:var(--purple);}
.tag-go{background:var(--red-bg);color:var(--red);}
.tag-shop{background:var(--blue-bg);color:var(--blue);}
.stars{color:var(--amber);font-size:12px;}
.section-hdr{font-size:11px;color:var(--muted2);padding:10px 20px 4px;text-transform:uppercase;letter-spacing:0.5px;}
.filter-bar{display:flex;gap:8px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:0.5px solid var(--border);}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-pill{font-size:12px;padding:5px 14px;border-radius:20px;white-space:nowrap;cursor:pointer;border:0.5px solid var(--border2);color:var(--muted);background:transparent;flex-shrink:0;}
.filter-pill.active{background:var(--amber);color:#000;border-color:var(--amber);font-weight:700;}
.photo-swiper{width:100%;height:300px;position:relative;overflow:hidden;flex-shrink:0;background:#000;}
.photo-swiper-track{display:flex;height:100%;transition:transform 0.3s ease;}
.photo-swiper-slide{min-width:100%;height:100%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#000;cursor:pointer;}
.photo-swiper-slide img{max-width:100%;max-height:100%;width:auto;height:auto;display:block;object-fit:contain;}
.slide-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;}
.photo-swiper-overlay{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--bg));pointer-events:none;z-index:1;}
.photo-dots{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2;}
.photo-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.35);}
.photo-dot.on{background:#fff;}
.photo-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.55);color:#fff;font-size:11px;padding:3px 8px;border-radius:20px;z-index:2;}
.photo-add-btn{background:rgba(0,0,0,0.65);color:var(--amber);font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;border:none;font-family:inherit;}
.photo-add-video-btn{background:rgba(0,0,0,0.65);color:var(--purple);font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;border:none;font-family:inherit;}
.photo-btn-row{position:absolute;bottom:8px;right:10px;display:flex;gap:6px;z-index:3;}
.photo-del-btn{position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,0.6);color:var(--red);font-size:12px;padding:5px 10px;border-radius:20px;cursor:pointer;z-index:2;}
.photo-cover-btn{position:absolute;bottom:8px;left:90px;background:rgba(0,0,0,0.65);color:var(--yellow);font-size:12px;padding:5px 10px;border-radius:20px;cursor:pointer;z-index:2;}
.photo-cover-btn.is-cover{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow);}

/* 全螢幕燈箱 */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.hidden{display:none;}
.lightbox-media{max-width:100%;max-height:85vh;object-fit:contain;border-radius:4px;}
.lightbox-close{position:absolute;top:16px;right:16px;color:#fff;font-size:28px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);border-radius:50%;}
.lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:32px;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);border-radius:50%;}
.lightbox-prev{left:10px;}
.lightbox-next{right:10px;}
.lightbox-count{position:absolute;bottom:20px;color:rgba(255,255,255,0.6);font-size:13px;}

/* 影片樣式 */
.photo-swiper-slide video{max-width:100%;max-height:100%;width:auto;height:auto;display:block;object-fit:contain;background:#000;}
.media-type-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;padding:3px 8px;border-radius:20px;z-index:2;}
.detail-body{padding:16px 20px;flex:1;overflow-y:auto;}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.detail-name{font-size:22px;font-weight:700;margin-bottom:6px;}
.detail-stars-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.detail-star{font-size:26px;cursor:pointer;color:var(--muted2);}
.detail-star.on{color:var(--amber);}
.detail-section{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;margin-top:12px;}
.detail-val{font-size:14px;color:#ccc;line-height:1.6;}
.detail-link{font-size:14px;color:var(--blue);word-break:break-all;cursor:pointer;}
.detail-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
.detail-btn{padding:12px;border-radius:12px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;}
.btn-nav{background:var(--blue-bg);color:var(--blue);}
.btn-link{background:var(--blue-bg);color:var(--blue);}
.btn-edit{background:var(--yellow-bg);color:var(--yellow);}
.btn-done{background:var(--green-bg);color:var(--green);}
.btn-del{background:var(--red-bg);color:var(--red);}
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-wrap.hidden{display:none;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;text-align:center;}
.modal-input{width:100%;background:var(--card2);border:0.5px solid var(--border2);border-radius:10px;padding:12px;font-size:15px;color:var(--text);margin-bottom:10px;font-family:inherit;}
.modal-input::placeholder{color:var(--muted2);}
.modal-label{font-size:12px;color:var(--muted);margin-bottom:4px;display:block;}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.modal-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;border:none;font-family:inherit;}
.modal-btn-cancel{background:var(--card2);color:var(--muted);}
.modal-btn-ok{background:var(--amber);color:#000;}
.modal-btn-danger{background:var(--red-bg);color:var(--red);}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.emoji-opt{font-size:24px;padding:6px;border-radius:8px;cursor:pointer;border:1px solid transparent;}
.emoji-opt.sel{border-color:var(--amber);background:var(--amber-bg);}
.star-picker{display:flex;gap:4px;margin-bottom:12px;}
.star-pick{font-size:28px;cursor:pointer;color:var(--muted2);}
.star-pick.on{color:var(--amber);}
.photo-upload{width:100%;background:var(--card2);border:0.5px dashed var(--border2);border-radius:10px;padding:16px;text-align:center;cursor:pointer;color:var(--muted);font-size:14px;margin-bottom:10px;}
.photo-preview{width:100%;height:120px;object-fit:cover;border-radius:10px;margin-bottom:10px;display:block;}
.edit-list-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.edit-list-name{flex:1;font-size:14px;}
.edit-btn{font-size:13px;padding:5px 10px;border-radius:8px;cursor:pointer;border:none;font-family:inherit;}
.edit-btn-del{background:var(--red-bg);color:var(--red);}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;line-height:2;}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px;}

/* Login page */
.login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px 20px;gap:20px;}
.login-logo{font-size:60px;margin-bottom:10px;}
.login-title{font-size:28px;font-weight:700;}
.login-sub{font-size:14px;color:var(--muted);text-align:center;line-height:1.6;}
.login-btn{width:100%;max-width:320px;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;}
.login-btn-google{background:#fff;color:#333;}
.login-btn-email{background:var(--amber);color:#000;}
.login-divider{color:var(--muted);font-size:13px;}

/* Friends page */
.friend-card{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:0.5px solid var(--border);cursor:pointer;}
.friend-avatar{width:44px;height:44px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;}
.friend-avatar img{width:100%;height:100%;object-fit:cover;}
.friend-body{flex:1;}
.friend-name{font-size:15px;font-weight:600;}
.friend-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.friend-action{color:var(--amber);font-size:13px;}
.profile-section{padding:20px;border-bottom:0.5px solid var(--border);}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px;overflow:hidden;}
.profile-avatar img{width:100%;height:100%;object-fit:cover;}
.profile-name{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px;}
.profile-email{text-align:center;font-size:13px;color:var(--muted);}
.profile-id{text-align:center;font-size:12px;color:var(--muted2);margin-top:4px;}
.sync-badge{position:absolute;top:10px;right:60px;background:var(--green-bg);color:var(--green);font-size:11px;padding:3px 8px;border-radius:20px;}
.sync-badge.syncing{background:var(--amber-bg);color:var(--amber);}

/* 搜尋 */
.search-bar{padding:8px 14px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.search-input{width:100%;background:var(--card2);border:0.5px solid var(--border2);border-radius:10px;padding:9px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;}
.search-input::placeholder{color:var(--muted2);}

/* 排序 */
.sort-bar{display:flex;gap:6px;padding:6px 14px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-pill{font-size:12px;padding:4px 12px;border-radius:20px;white-space:nowrap;cursor:pointer;border:0.5px solid var(--border2);color:var(--muted);background:transparent;flex-shrink:0;}
.sort-pill.active{background:var(--green);color:#000;border-color:var(--green);font-weight:700;}

/* 長按刪除 */
.list-item.pressing{background:var(--red-bg) !important;transition:background 0.15s;}

/* 聊天 */
.chat-list-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:0.5px solid var(--border);cursor:pointer;}
.chat-avatar{width:46px;height:46px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;position:relative;}
.chat-avatar img{width:100%;height:100%;object-fit:cover;}
.chat-unread{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.chat-body{flex:1;min-width:0;}
.chat-name{font-size:15px;font-weight:600;}
.chat-preview{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-time{font-size:11px;color:var(--muted2);flex-shrink:0;}
.chat-room{display:flex;flex-direction:column;height:100%;}
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.chat-bubble-row{display:flex;align-items:flex-end;gap:8px;}
.chat-bubble-row.me{flex-direction:row-reverse;}
.chat-bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.chat-bubble.me{background:var(--amber);color:#000;border-bottom-right-radius:4px;}
.chat-bubble.them{background:var(--card2);color:var(--text);border-bottom-left-radius:4px;}
.chat-bubble img,.chat-bubble video{max-width:200px;max-height:200px;border-radius:10px;display:block;margin-top:4px;cursor:pointer;}
.chat-meta{font-size:10px;color:var(--muted2);margin-top:2px;display:flex;align-items:center;gap:4px;}
.chat-meta.me{justify-content:flex-end;}
.chat-read{color:var(--blue);font-size:11px;}
.chat-input-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0;}
.chat-input{flex:1;background:var(--card2);border:0.5px solid var(--border2);border-radius:20px;padding:9px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;max-height:100px;resize:none;}
.chat-input::placeholder{color:var(--muted2);}
.chat-send-btn{width:36px;height:36px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;font-size:16px;}
.chat-media-btn{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:18px;border:none;}

.hours-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.hours-days{flex:1.2;background:var(--card2);border:0.5px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);font-family:inherit;}
.hours-time{width:72px;background:var(--card2);border:0.5px solid var(--border2);border-radius:8px;padding:8px 6px;font-size:13px;color:var(--text);font-family:inherit;text-align:center;}
.hours-sep{color:var(--muted);font-size:12px;flex-shrink:0;}
.hours-del{background:var(--red-bg);color:var(--red);border:none;border-radius:8px;padding:8px 10px;font-size:13px;cursor:pointer;flex-shrink:0;font-family:inherit;}
.hours-add-btn{width:100%;background:var(--card2);border:0.5px dashed var(--border2);border-radius:8px;padding:9px;font-size:13px;color:var(--muted);cursor:pointer;text-align:center;margin-bottom:10px;}
.hours-display{margin-bottom:12px;}
.hours-group{display:flex;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);}
.hours-group:last-child{border-bottom:none;}
.hours-group-day{font-size:13px;color:var(--muted);width:52px;flex-shrink:0;padding-top:1px;}
.hours-group-slots{flex:1;}
.hours-group-slot{font-size:13px;color:var(--text);line-height:1.8;}
.hours-slot-note{font-size:11px;color:var(--muted2);margin-left:6px;}


.modal-photo-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.modal-photo-thumb{width:70px;height:70px;border-radius:8px;object-fit:cover;cursor:pointer;border:2px solid transparent;}
.modal-photo-thumb:active{border-color:var(--red);opacity:0.7;}
.modal-photo-add{width:70px;height:70px;border-radius:8px;background:var(--card2);border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;color:var(--muted2);flex-shrink:0;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header" id="header">
    <div class="header-back" id="headerBack" style="display:none">‹</div>
    <div class="header-title" id="headerTitle">我的收藏</div>
    <div class="header-action" id="headerAction"></div>
  </div>
  <div class="page" id="pageContent"></div>
  <div class="bottom-nav" id="bottomNav" style="display:none"></div>
</div>
<div class="modal-wrap hidden" id="modalWrap">
  <div class="modal" id="modalBody"></div>
</div>
<input type="file" id="photoInput" accept="image/*" style="display:none"/>
<input type="file" id="videoInput" accept="video/*" style="display:none"/>

<!-- 全螢幕燈箱 -->
<div class="lightbox hidden" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="lightbox-close" onclick="closeLightbox()">✕</div>
  <div class="lightbox-prev" id="lbPrev" onclick="lightboxNav(-1)">‹</div>
  <div id="lightboxMedia"></div>
  <div class="lightbox-next" id="lbNext" onclick="lightboxNav(1)">›</div>
  <div class="lightbox-count" id="lbCount"></div>
</div>

<!-- Firebase -->
<script type="module">

import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const firebaseConfig = {

  authDomain: "my-collection-app-c51f4.firebaseapp.com",

  storageBucket: "my-collection-app-c51f4.firebasestorage.app",
  messagingSenderId: "27195030094",
  appId: "1:27195030094:web:14a4ffec9b541fb5db611f"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// ===== STATE =====
let currentUser = null;
let userProfile = null;
let items = [];
let shopItems = [];
let countries = [];
let shopCats = [];
let CATS = [{id:'eat',label:'好吃',emoji:'🍜',cls:'tag-eat'},{id:'play',label:'好玩',emoji:'🏞',cls:'tag-play'},{id:'buy',label:'好買',emoji:'🏪',cls:'tag-buy'},{id:'go',label:'想去',emoji:'📍',cls:'tag-go'}];
let friends = [];
let viewingUid = null; // null = own, uid = friend's

// 修正國家 emoji：若為文字縮寫（如 TW/JP）則轉換為旗子 emoji
function fixCountryEmoji(c) {
  const emojiMap = {
    'TW':'🇹🇼','JP':'🇯🇵','KR':'🇰🇷','US':'🇺🇸','GB':'🇬🇧','FR':'🇫🇷',
    'IT':'🇮🇹','DE':'🇩🇪','TH':'🇹🇭','SG':'🇸🇬','AU':'🇦🇺','CN':'🇨🇳',
    'HK':'🇭🇰','MO':'🇲🇴','VN':'🇻🇳','MY':'🇲🇾','ID':'🇮🇩','PH':'🇵🇭',
    'IN':'🇮🇳','ES':'🇪🇸','PT':'🇵🇹','NL':'🇳🇱','CH':'🇨🇭','CA':'🇨🇦',
    'MX':'🇲🇽','BR':'🇧🇷','AR':'🇦🇷','NZ':'🇳🇿',
  };
  if(c.emoji && emojiMap[c.emoji.toUpperCase()]) {
    c.emoji = emojiMap[c.emoji.toUpperCase()];
  }
  return c;
}

async function loadUserData() {
  const uid = viewingUid || currentUser.uid;
  const d = await getDoc(doc(db,'userData',uid));
  if(d.exists()) {
    const data = d.data();
    countries = (data.countries || DEFAULT_COUNTRIES).map(fixCountryEmoji);
    shopCats = data.shopCats || DEFAULT_SHOPCATS;
    if(data.cats && data.cats.length) CATS = data.cats;
  } else {
    countries = DEFAULT_COUNTRIES;
    shopCats = DEFAULT_SHOPCATS;
    if(!viewingUid) await saveUserData();
  }
  // Load items with photos from subcollection
  const itemsSnap = await getDocs(collection(db,'userData',uid,'items'));
  items = await Promise.all(itemsSnap.docs.map(async d=>{
    const item = {id:d.id,...d.data()};
    if(item.photoCount>0) item.photos = await loadItemPhotos(uid,d.id,'items');
    else item.photos = item.photos||[];
    return item;
  }));
  const shopSnap = await getDocs(collection(db,'userData',uid,'shopItems'));
  shopItems = await Promise.all(shopSnap.docs.map(async d=>{
    const item = {id:d.id,...d.data()};
    if(item.photoCount>0) item.photos = await loadItemPhotos(uid,d.id,'shopItems');
    else item.photos = item.photos||[];
    return item;
  }));
  // Load friends
  if(!viewingUid) {
    friends = userProfile.friends || [];
  }
}

// Setup realtime listeners for own data
let ownListeners = [];
function setupOwnListeners() {
  ownListeners.forEach(u=>u()); ownListeners=[];
  const uid = currentUser.uid;
  
  // Listen to own items - 保留記憶體中的照片，不被 snapshot 蓋掉
  ownListeners.push(onSnapshot(collection(db,'userData',uid,'items'), snap=>{
    if(viewingUid) return;
    const existingPhotos = {};
    items.forEach(i=>{ if(i.photos&&i.photos.length) existingPhotos[i.id]=i.photos; });
    items = snap.docs.map(d=>{
      const item = {id:d.id,...d.data()};
      item.photos = existingPhotos[d.id] || item.photos || [];
      return item;
    });
    if(nav.page !== 'detail') render();
  }));
  
  // Listen to own shopItems
  ownListeners.push(onSnapshot(collection(db,'userData',uid,'shopItems'), snap=>{
    if(viewingUid) return;
    const existingPhotos = {};
    shopItems.forEach(i=>{ if(i.photos&&i.photos.length) existingPhotos[i.id]=i.photos; });
    shopItems = snap.docs.map(d=>{
      const item = {id:d.id,...d.data()};
      item.photos = existingPhotos[d.id] || item.photos || [];
      return item;
    });
    if(nav.page !== 'shopdetail') render();
  }));
  
  // Listen to own userData (countries, cats etc)
  ownListeners.push(onSnapshot(doc(db,'userData',uid), snap=>{
    if(viewingUid || !snap.exists()) return;
    const data = snap.data();
    countries = (data.countries || DEFAULT_COUNTRIES).map(fixCountryEmoji);
    shopCats = data.shopCats || DEFAULT_SHOPCATS;
    if(data.cats && data.cats.length) CATS = data.cats;
  }));
  
  // Listen to own profile (for friend code etc)
  ownListeners.push(onSnapshot(doc(db,'users',uid), snap=>{
    if(viewingUid || !snap.exists()) return;
    userProfile = snap.data();
    friends = userProfile.friends || [];
    // 重新監聽好友名字
    setupFriendProfileListeners();
    if(nav.page === 'friends') render();
  }));
}

// 即時監聽所有好友的名字/頭像
let friendProfileListeners = [];
function setupFriendProfileListeners() {
  friendProfileListeners.forEach(u=>u()); friendProfileListeners=[];
  friends.forEach(f=>{
    const unsub = onSnapshot(doc(db,'users',f.uid), snap=>{
      if(!snap.exists()) return;
      const data = snap.data();
      const fi = friends.findIndex(x=>x.uid===f.uid);
      if(fi>-1) {
        friends[fi].name = data.name || friends[fi].name;
        friends[fi].photo = data.photo || friends[fi].photo;
        // 同步更新 userProfile
        if(userProfile.friends) {
          userProfile.friends[fi] = friends[fi];
        }
      }
      if(nav.page === 'friends') render();
    });
    friendProfileListeners.push(unsub);
  });
}

  const startIdx = existing.size;
  await Promise.all(newPhotos.map((data, i) =>

async function deletePhotoFromCol(uid, colName, itemId, displayIdx) {
  const col = collection(db,'userData',uid,colName,itemId,'photos');
  const snap = await getDocs(col);
  const sorted = snap.docs.sort((a,b)=>a.data().idx-b.data().idx);
  if(sorted[displayIdx]) await deleteDoc(sorted[displayIdx].ref);
}

async function loadItemPhotos(uid, itemId, colName) {

  if(snap.empty) return [];
  return snap.docs.sort((a,b)=>a.data().idx-b.data().idx).map(d=>d.data().data);
}

// 圖片壓縮
async function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1080;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderCountries() {
  let h = '<div class="section-hdr">— 選擇國家 —</div>';
  if(!countries.length) return '<div class="empty">還沒有國家<br>'+(isReadOnly()?'':'按右上角開始新增！')+'</div>';
  countries.forEach(c=>{
    const cnt = items.filter(i=>i.country===c.id&&!i.done).length;
    h += `<div class="list-item" onclick="goRegions('${c.id}')">
      <div class="list-icon" style="background:#1a1a1a;font-size:28px">${c.emoji}</div>
      <div class="list-body"><div class="list-name">${c.name}</div><div class="list-sub">${cnt} 筆收藏</div></div>
      <div class="list-arrow">›</div></div>`;
  });
  return h;
}

function renderRegions() {
  const c = countries.find(x=>x.id===nav.country); if(!c) return '';
  const allCnt = items.filter(i=>i.country===c.id&&!i.done).length;
  let h = `<div class="list-item" style="background:var(--yellow-bg)" onclick="goAllList()">
    <div class="list-icon" style="background:var(--yellow-bg);font-size:22px">📋</div>
    <div class="list-body"><div class="list-name" style="color:var(--yellow)">${c.name}全部收藏</div>
    <div class="list-sub" style="color:var(--muted)">不分地區 · ${allCnt} 筆</div></div>
    <div class="list-arrow" style="color:var(--yellow)">›</div></div>`;
  h += '<div class="section-hdr">— 依地區 —</div>';
  (c.regions||[]).forEach(r=>{
    const cnt = items.filter(i=>i.country===c.id&&i.region===r&&!i.done).length;
    h += `<div class="list-item" onclick="goCats('${r}')">
      <div class="list-icon" style="background:var(--blue-bg);font-size:20px">📍</div>
      <div class="list-body"><div class="list-name">${r}</div><div class="list-sub">${cnt} 筆</div></div>
      <div class="list-arrow">›</div></div>`;
  });
  return h;
}

function renderCats() {
  return CATS.map(cat=>{
    const cnt = items.filter(i=>i.country===nav.country&&i.region===nav.region&&i.cat===cat.id&&!i.done).length;
    return `<div class="list-item" onclick="goList('${cat.id}')">
      <div class="list-icon" style="background:${getCatBg(cat.id)};font-size:22px">${cat.emoji}</div>
      <div class="list-body"><div class="list-name">${cat.label}</div><div class="list-sub">${cnt} 筆</div></div>
      <div class="list-arrow">›</div></div>`;
  }).join('');
}

function getCatBg(id){return{eat:'var(--amber-bg)',play:'var(--green-bg)',buy:'var(--purple-bg)',go:'var(--red-bg)'}[id]||'var(--card2)';}

function getFilteredItems() {
  let base = items.filter(i=>!i.done);
  if(nav.page==='list') base = items.filter(i=>i.country===nav.country&&i.region===nav.region&&i.cat===nav.cat&&!i.done);
  else if(nav.page==='alllist') {
    base = items.filter(i=>i.country===nav.country&&!i.done);
    if(nav.filter&&nav.filter!=='all') base = base.filter(i=>i.cat===nav.filter);
  }
  if(nav.search) {
    const q = nav.search.toLowerCase();
    base = base.filter(i=>i.name.toLowerCase().includes(q)||(i.note||'').toLowerCase().includes(q)||(i.address||'').toLowerCase().includes(q));
  }
  const sort = nav.sort||'stars';
  if(sort==='newest') return base.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if(sort==='name') return base.sort((a,b)=>a.name.localeCompare(b.name,'zh-TW'));
  return base.sort((a,b)=>(b.stars||0)-(a.stars||0));
}

function renderListItem(item, from) {
  const cat = CATS.find(c=>c.id===item.cat)||CATS[0];
  const starsStr = '★'.repeat(item.stars||0);
  let sub = `<span class="stars" style="font-size:11px">${starsStr}</span>`;
  if(from==='alllist') sub += ` <span class="tag tag-loc">📍${item.region}</span><span class="tag ${cat.cls}">${cat.label}</span>`;
  if(item.note) sub += ` <span style="color:var(--muted);font-size:11px">${item.note.slice(0,15)}${item.note.length>15?'…':''}</span>`;
  const hasPhoto = item.photos&&item.photos.length;
  const thumb = hasPhoto?`background:var(--card2);`:`background:${getCatBg(item.cat)};`;
  const coverImg = hasPhoto ? item.photos[item.coverIdx||0]||item.photos[0] : null;
  const icon = coverImg?`<img src="${coverImg}" style="width:100%;height:100%;object-fit:cover;"/>`:cat.emoji;
  return `<div class="list-item" 
    onclick="goDetail('${item.id}','${from}')"
    ${!isReadOnly()?`ontouchstart="startLongPress('${item.id}',this,event)" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()"`:''}>
    <div class="list-icon" style="${thumb}font-size:22px">${icon}</div>
    <div class="list-body"><div class="list-name">${item.name}</div><div class="list-sub">${sub}</div></div>
    <div class="list-arrow">›</div></div>`;
}

function renderList() {
  const f = getFilteredItems();
  const sortBar = `<div class="sort-bar">
    <span class="sort-pill${(nav.sort||'stars')==='stars'?' active':''}" onclick="setSort('stars')">⭐ 星星</span>
    <span class="sort-pill${nav.sort==='newest'?' active':''}" onclick="setSort('newest')">🕐 最新</span>
    <span class="sort-pill${nav.sort==='name'?' active':''}" onclick="setSort('name')">🔤 名稱</span>
  </div>`;
  const searchBar = `<div class="search-bar"><input class="search-input" placeholder="🔍 搜尋名稱、備註..." value="${esc(nav.search||'')}" oninput="setSearch(this.value)"/></div>`;
  if(!f.length) return searchBar+sortBar+`<div class="empty">${nav.search?'找不到符合的收藏':'還沒有收藏'+(isReadOnly()?'':'<br>按右上角 ＋ 新增！')}</div>`;
  return searchBar+sortBar+`<div class="section-hdr">— 共 ${f.length} 筆 —</div>`+f.map(i=>renderListItem(i,'list')).join('');
}

function renderAllList() {
  nav.filter = nav.filter||'all';
  const f = getFilteredItems();
  const searchBar = `<div class="search-bar"><input class="search-input" placeholder="🔍 搜尋名稱、備註..." value="${esc(nav.search||'')}" oninput="setSearch(this.value)"/></div>`;
  let h = searchBar+'<div class="filter-bar">';
  h += `<div class="filter-pill${nav.filter==='all'?' active':''}" onclick="setFilter('all')">全部</div>`;
  CATS.forEach(cat=>{ h+=`<div class="filter-pill${nav.filter===cat.id?' active':''}" onclick="setFilter('${cat.id}')">${cat.emoji} ${cat.label}</div>`; });
  h += '</div>';
  h += `<div class="sort-bar">
    <span class="sort-pill${(nav.sort||'stars')==='stars'?' active':''}" onclick="setSort('stars')">⭐ 星星</span>
    <span class="sort-pill${nav.sort==='newest'?' active':''}" onclick="setSort('newest')">🕐 最新</span>
    <span class="sort-pill${nav.sort==='name'?' active':''}" onclick="setSort('name')">🔤 名稱</span>
  </div>`;
  if(!f.length) return h+(nav.search?'<div class="empty">找不到符合的收藏</div>':'<div class="empty">這個分類還沒有收藏</div>');
  h += `<div class="section-hdr">— 共 ${f.length} 筆 —</div>`;
  return h + f.map(i=>renderListItem(i,'alllist')).join('');
}

function renderHoursDisplay(hours) {
  if(!hours||!hours.length) return '';
  const groups = [];
  hours.forEach(h=>{
    const last = groups[groups.length-1];
    if(last && last.day===h.days) last.slots.push(h);
    else groups.push({day:h.days, slots:[h]});
  });
  return '<div class="hours-display">'+groups.map(g=>{
    const slotsHtml = g.slots.map(s=>{
      const timeStr = s.open&&s.close ? s.open+' – '+s.close : (s.note||'公休');
      const noteSpan = s.note&&s.open ? '<span class="hours-slot-note">'+esc(s.note)+'</span>' : '';
      return '<div class="hours-group-slot">'+timeStr+noteSpan+'</div>';
    }).join('');
    return '<div class="hours-group"><div class="hours-group-day">'+esc(g.day)+'</div><div class="hours-group-slots">'+slotsHtml+'</div></div>';
  }).join('')+'</div>';
}

function makeSlide(p, idx, itemId) {
  if(isVideo(p)) {
    return `<div class="photo-swiper-slide" data-open-idx="${idx}" data-open-id="${itemId}">
      <video src="${p}" playsinline muted loop autoplay style="width:100%;height:100%;object-fit:cover;pointer-events:none;"></video>
      <div class="media-type-badge">▶ 影片</div>
    </div>`;
  }
  return `<div class="photo-swiper-slide" data-open-idx="${idx}" data-open-id="${itemId}"><img src="${p}" style="pointer-events:none;"/></div>`;
}

function renderDetail() {
  const item = items.find(i=>i.id===nav.itemId); if(!item) return '<div class="empty">找不到</div>';
  const cat = CATS.find(c=>c.id===item.cat)||CATS[0];
  const c = countries.find(x=>x.id===item.country);
  const photos = item.photos||[];
  const slides = photos.length ? photos.map((p,i)=>makeSlide(p,i,item.id)).join('') :
    `<div class="photo-swiper-slide"><div class="slide-emoji">${cat.emoji}</div></div>`;
  const dots = photos.length>1 ? photos.map((_,i)=>`<div class="photo-dot${i===0?' on':''}" id="dot_${item.id}_${i}"></div>`).join('') : '';
  const count = photos.length>1 ? `<div class="photo-count">1 / ${photos.length}</div>` : '';
  let h = `<div class="photo-swiper" id="swiper_${item.id}" data-idx="0" data-count="${photos.length}" data-id="${item.id}" data-type="item">
    <div class="photo-swiper-track" id="track_${item.id}">${slides}</div>
    <div class="photo-swiper-overlay"></div>
    ${dots?'<div class="photo-dots">'+dots+'</div>':''}${count}
    ${!isReadOnly()?`<div class="photo-btn-row">
      <div class="photo-add-btn" onclick="addMediaType('${item.id}','item','image')">📷 ＋照片</div>
      <div class="photo-add-video-btn" onclick="addMediaType('${item.id}','item','video')">🎥 ＋影片</div>
    </div>`:''}
    ${!isReadOnly()&&photos.length>1?`<div class="photo-cover-btn" id="coverBtn_${item.id}" onclick="setCover('${item.id}','item')">⭐ 設封面</div>`:''}
    ${!isReadOnly()&&photos.length?`<div class="photo-del-btn" onclick="delPhoto('${item.id}','item')">🗑 刪除此張</div>`:''}
  </div>`;
  const starClick = isReadOnly() ? '' : 'setItemStar';
  const starsHtml = [1,2,3,4,5].map(v=>{
    const on = v<=(item.stars||0) ? ' on' : '';
    const click = starClick ? 'onclick="'+starClick+'(\''+item.id+'\','+v+')"' : '';
    return '<span class="detail-star'+on+'" '+click+'>★</span>';
  }).join('');
  h += `<div class="detail-body">
    <div class="detail-tags">
      ${c?`<span class="tag" style="background:#1a1a1a;color:var(--muted)">${c.emoji} ${c.name}</span>`:''}
      <span class="tag tag-loc">📍 ${item.region}</span>
      <span class="tag ${cat.cls}">${cat.label}</span>
    </div>
    <div class="detail-name">${item.name}</div>
    <div class="detail-stars-row">${starsHtml}</div>
    ${item.note?`<div class="detail-section">備註</div><div class="detail-val">${item.note}</div>`:''}
    ${item.hours&&item.hours.length?`<div class="detail-section">🕐 營業時間</div>`+renderHoursDisplay(item.hours):''}
    ${item.address?`<div class="detail-section">地址</div><div class="detail-val">${item.address}</div>`:''}
    ${item.phone?`<div class="detail-section">電話</div><div class="detail-val"><a href="tel:${esc(item.phone)}" style="color:var(--green);text-decoration:none">📞 ${esc(item.phone)}</a></div>`:''}
    ${item.link?`<div class="detail-section">連結</div><div class="detail-link" onclick="openLink('${item.link}')">${item.link}</div>`:''}
    <div class="detail-btns">
      ${item.address?`<div class="detail-btn btn-nav" onclick="openMap('${item.address}')">🧭 導航</div>`:''}
      ${item.phone?`<div class="detail-btn" style="background:var(--green-bg);color:var(--green)" onclick="window.location='tel:${esc(item.phone)}'">📞 致電</div>`:''}
      ${item.link?`<div class="detail-btn btn-link" onclick="openLink('${item.link}')">🔗 連結</div>`:''}
      <div class="detail-btn" style="background:var(--blue-bg);color:var(--blue)" onclick="shareItem('${item.id}')">📤 分享</div>
      ${isReadOnly()?`<div class="detail-btn" style="background:var(--green-bg);color:var(--green)" onclick="copyFromFriend('${item.id}')">➕ 複製到我的</div>`:''}
      ${!isReadOnly()?`<div class="detail-btn btn-edit" onclick="openEditItem('${item.id}')">✏️ 編輯</div>`:''}
      ${!isReadOnly()?`<div class="detail-btn btn-del" onclick="deleteItem('${item.id}')">🗑 刪除</div>`:''}
    </div>
  </div>`;
  return h;
}

// ===== FRIENDS =====
let incomingRequests = []; // 收到的好友邀請

function setupFriendRequestListener() {
  if(!currentUser) return;
  // 監聽收到的好友邀請
  const q = query(collection(db,'friendRequests'), where('to','==',currentUser.uid), where('status','==','pending'));
  return onSnapshot(q, snap=>{
    incomingRequests = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(nav.page==='friends') renderPage();
    else renderBottomNav(); // 更新紅點
  });
}

function renderFriends() {
  let h = '';

  // 好友邀請區
  if(incomingRequests.length > 0) {
    h += `<div class="section-hdr">— 好友邀請 ${incomingRequests.length} 個 —</div>`;
    incomingRequests.forEach(req=>{
      h += `<div class="friend-card" style="background:var(--amber-bg)">
        <div class="friend-avatar">${req.fromPhoto?`<img src="${req.fromPhoto}"/>`:'👤'}</div>
        <div class="friend-body">
          <div class="friend-name">${esc(req.fromName)}</div>
          <div class="friend-sub">想加你為好友</div>
        </div>
        <div style="display:flex;gap:6px">
          <div style="background:var(--green);color:#000;font-size:12px;font-weight:700;padding:6px 12px;border-radius:10px;cursor:pointer" onclick="acceptFriendRequest('${req.id}')">確認</div>
          <div style="background:var(--card2);color:var(--muted);font-size:12px;padding:6px 12px;border-radius:10px;cursor:pointer" onclick="declineFriendRequest('${req.id}')">拒絕</div>
        </div>
      </div>`;
    });
  }

  if(friends.length===0) {
    h += '<div class="empty">還沒有好友<br>按右上角 ＋ 新增好友！</div>';
  } else {
    h += '<div class="section-hdr">— 好友列表 —</div>';
    friends.forEach(f=>{
      h += `<div class="friend-card" onclick="viewFriend('${f.uid}')">
        <div class="friend-avatar">${f.photo?`<img src="${f.photo}"/>`:'👤'}</div>
        <div class="friend-body">
          <div class="friend-name">${f.name}</div>
          <div class="friend-sub">${f.email||''}</div>
        </div>
        <div class="friend-action">查看收藏 ›</div>
      </div>`;
    });
  }

  // My friend code
  h += `<div style="margin:20px;background:var(--card);border-radius:16px;padding:16px;text-align:center;">
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">我的好友代碼（讓朋友輸入這個）</div>
    <div style="font-size:28px;font-weight:700;letter-spacing:4px;color:var(--amber)">${userProfile?.friendCode||'------'}</div>
    <div style="font-size:11px;color:var(--muted2);margin-top:6px;">朋友輸入此代碼就能加你為好友</div>
  </div>`;
  return h;
}

window.openAddFriend = function() {
  openModal(`<div class="modal-title">新增好友</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center;">輸入朋友的好友代碼</div>
    <input class="modal-input" id="mFriendCode" placeholder="例：AB12CD" maxlength="6" style="text-transform:uppercase;text-align:center;font-size:20px;font-weight:700;letter-spacing:4px;"/>
    <div class="modal-btns">
      <div class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</div>
      <div class="modal-btn modal-btn-ok" onclick="doAddFriend()">送出邀請</div>
    </div>`);
};

window.doAddFriend = async function() {
  const code = document.getElementById('mFriendCode').value.trim().toUpperCase();
  if(!code || code.length<4) { alert('請輸入正確的好友代碼'); return; }
  try {
    const q = query(collection(db,'users'), where('friendCode','==',code));
    const snap = await getDocs(q);
    if(snap.empty) { alert('找不到這個好友代碼'); return; }
    const friendData = snap.docs[0].data();
    if(friendData.uid === currentUser.uid) { alert('不能加自己為好友 😅'); return; }
    if(friends.find(f=>f.uid===friendData.uid)) { alert('這個人已經是你的好友了！'); return; }

    // 檢查是否已送過邀請
    const existing = query(collection(db,'friendRequests'),
      where('from','==',currentUser.uid), where('to','==',friendData.uid), where('status','==','pending'));
    const existingSnap = await getDocs(existing);
    if(!existingSnap.empty) { alert('已送出邀請，等待對方確認中！'); closeModal(); return; }

    // 送出好友邀請
    await addDoc(collection(db,'friendRequests'), {
      from: currentUser.uid,
      to: friendData.uid,
      fromName: userProfile.name || currentUser.displayName || '用戶',
      fromPhoto: userProfile.photo || currentUser.photoURL || '',
      fromEmail: currentUser.email || '',
      status: 'pending',
      t: Date.now()
    });

    closeModal();
    alert(`✅ 已送出好友邀請給 ${friendData.name}，等待對方確認！`);
  } catch(e) { alert('送出失敗：'+e.message); }
};

window.acceptFriendRequest = async function(reqId) {
  const req = incomingRequests.find(r=>r.id===reqId);
  if(!req) return;
  try {
    // 雙方互加好友
    const newFriend = {uid:req.from, name:req.fromName, email:req.fromEmail||'', photo:req.fromPhoto||''};
    friends.push(newFriend);
    userProfile.friends = friends;
    await setDoc(doc(db,'users',currentUser.uid), userProfile);

    // 對方也加我為好友
    const theirDoc = await getDoc(doc(db,'users',req.from));
    if(theirDoc.exists()) {
      const theirData = theirDoc.data();
      const theirFriends = theirData.friends||[];
      if(!theirFriends.find(f=>f.uid===currentUser.uid)) {
        theirFriends.push({uid:currentUser.uid, name:userProfile.name, email:currentUser.email||'', photo:userProfile.photo||''});
        await setDoc(doc(db,'users',req.from), {...theirData, friends:theirFriends});
      }
    }

    // 更新邀請狀態
    await setDoc(doc(db,'friendRequests',reqId), {status:'accepted'}, {merge:true});

    setupChatListeners();
    render();
    alert(`✅ 已確認好友：${req.fromName}`);
  } catch(e) { alert('確認失敗：'+e.message); }
};

// ===== 聊天功能 =====
let chatListeners = {};
let chatMessages = {};
let chatUnread = {};
let currentChatUid = null;

function getChatId(uid1, uid2) {
  return [uid1, uid2].sort().join('_');
}

function getTotalUnread() {
  return Object.values(chatUnread).reduce((a,b)=>a+b, 0);
}

function setupChatListeners() {
  friends.forEach(f => {
    const chatId = getChatId(currentUser.uid, f.uid);
    if(chatListeners[chatId]) return;
    const col = collection(db, 'chats', chatId, 'messages');
    // 只載入最近 50 則，避免載太多
    const q2 = query(col, orderBy('t', 'desc'), limit(50));
    chatListeners[chatId] = onSnapshot(q2, snap => {
      const msgs = snap.docs.map(d=>({id:d.id,...d.data()})).reverse();
      chatMessages[chatId] = msgs;
      chatUnread[chatId] = msgs.filter(m=>m.from!==currentUser.uid&&!m.readBy?.[currentUser.uid]).length;
      if(nav.page==='chatlist') renderPage();
      else if(nav.page==='chatroom' && currentChatUid===f.uid) {
        renderPage();
        markChatRead(chatId);
        // 自動滾到底部
        setTimeout(()=>{ const el=document.getElementById('chatMessages'); if(el) el.scrollTop=el.scrollHeight; },50);
      } else {
        renderBottomNav();
      }
    });
  });
}

async function markChatRead(chatId) {
  const msgs = chatMessages[chatId]||[];
  const unread = msgs.filter(m=>m.from!==currentUser.uid&&!m.readBy?.[currentUser.uid]);
  if(!unread.length) return;
  await Promise.all(unread.map(m=>
    setDoc(doc(db,'chats',chatId,'messages',m.id), {readBy:{[currentUser.uid]:Date.now()}}, {merge:true})
  ));
  chatUnread[chatId] = 0;
}

function renderChatList() {
  if(!friends.length) return '<div class="empty">還沒有好友<br>去「好友」頁面新增好友！</div>';
  let h = '';
  friends.forEach(f => {
    const chatId = getChatId(currentUser.uid, f.uid);
    const msgs = chatMessages[chatId]||[];
    const last = msgs[msgs.length-1];
    const unread = chatUnread[chatId]||0;
    let preview = '點擊開始聊天';
    if(last) {
      if(last.recalled) preview = '訊息已收回';
      else if(last.deletedBy && last.deletedBy.includes(currentUser.uid)) {
        // 自己刪的，找上一則
        const visible = msgs.filter(m=>!(m.deletedBy&&m.deletedBy.includes(currentUser.uid)));
        const prev = visible[visible.length-1];
        preview = prev ? (prev.recalled?'訊息已收回':prev.img?'📷 圖片':prev.video?'🎥 影片':prev.text||'') : '點擊開始聊天';
      }
      else if(last.img) preview = '📷 圖片';
      else if(last.video) preview = '🎥 影片';
      else preview = last.text||'';
    }
    const timeStr = last ? formatChatTime(last.t) : '';
    h += `<div class="chat-list-item" onclick="openChat('${f.uid}')">
      <div class="chat-avatar" style="position:relative">
        ${f.photo?`<img src="${f.photo}"/>`:'👤'}
        ${unread>0?`<div class="chat-unread">${unread>9?'9+':unread}</div>`:''}
      </div>
      <div class="chat-body">
        <div class="chat-name">${esc(f.name)}</div>
        <div class="chat-preview" style="${unread>0?'color:var(--text);font-weight:600':''}">${esc(preview.slice(0,30))}</div>
      </div>
      ${timeStr?`<div class="chat-time">${timeStr}</div>`:''}
    </div>`;
  });
  return h;
}

function formatChatTime(ts) {
  if(!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if(diff < 60000) return '剛剛';
  if(diff < 3600000) return Math.floor(diff/60000)+'分前';
  if(diff < 86400000) return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function renderChatRoom() {
  const f = friends.find(x=>x.uid===currentChatUid);
  if(!f) return '<div class="empty">找不到對話</div>';
  const chatId = getChatId(currentUser.uid, f.uid);
  const msgs = chatMessages[chatId]||[];

  const bubblesHtml = msgs.map(m => {
    const isMe = m.from === currentUser.uid;
    const time = formatChatTime(m.t);

    // 只有自己刪除的 → 自己看不到，直接跳過
    if(m.deletedBy && m.deletedBy.includes(currentUser.uid)) return '';

    // 收回訊息 → 雙方都看到「訊息已收回」
    if(m.recalled) {
      return `<div class="chat-bubble-row ${isMe?'me':'them'}">
        ${!isMe?`<div class="chat-avatar" style="width:32px;height:32px;font-size:14px;flex-shrink:0">${f.photo?`<img src="${f.photo}"/>`:'👤'}</div>`:''}
        <div>
          <div class="chat-bubble ${isMe?'me':'them'}" style="opacity:0.45;font-style:italic">訊息已收回</div>
          <div class="chat-meta ${isMe?'me':''}"><span>${time}</span></div>
        </div>
      </div>`;
    }

    let content = '';
    if(m.text) content += `<div>${esc(m.text)}</div>`;
    if(m.img) content += `<img src="${m.img}" onclick="openChatMedia('${m.id}','img')" style="max-width:200px;max-height:200px;border-radius:10px;display:block;margin-top:${m.text?'6':'0'}px;cursor:pointer"/>`;
    if(m.video) content += `<video src="${m.video}" style="max-width:200px;max-height:200px;border-radius:10px;display:block;margin-top:${m.text?'6':'0'}px" controls playsinline></video>`;

    const readMark = isMe
      ? (m.readBy && Object.keys(m.readBy).some(k=>k!==currentUser.uid) ? '✓✓' : '✓')
      : '';

    const longPressAttr = `ontouchstart="startMsgLongPress('${m.id}','${isMe}',this)" ontouchend="cancelMsgLongPress()" ontouchmove="cancelMsgLongPress()"`;

    return `<div class="chat-bubble-row ${isMe?'me':'them'}">
      ${!isMe?`<div class="chat-avatar" style="width:32px;height:32px;font-size:14px;flex-shrink:0">${f.photo?`<img src="${f.photo}"/>`:'👤'}</div>`:''}
      <div ${longPressAttr}>
        <div class="chat-bubble ${isMe?'me':'them'}">${content}</div>
        <div class="chat-meta ${isMe?'me':''}">
          <span>${time}</span>
          ${isMe?`<span class="chat-read">${readMark}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  const emptyMsg = `<div style="text-align:center;color:var(--muted);font-size:13px;padding:40px 0">開始和 ${esc(f.name)} 聊天吧！</div>`;

  return `<div class="chat-room">
    <div class="chat-messages" id="chatMessages">${bubblesHtml||emptyMsg}</div>
    <div class="chat-input-bar">
      <button class="chat-media-btn" onclick="sendChatMedia('img')">📷</button>
      <button class="chat-media-btn" onclick="sendChatMedia('video')">🎥</button>
      <textarea class="chat-input" id="chatInput" placeholder="輸入訊息..." rows="1"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg();}"></textarea>
      <button class="chat-send-btn" onclick="sendChatMsg()">➤</button>
    </div>
  </div>`;
}

// 長按訊息選單
let _msgLpTimer = null;
window.startMsgLongPress = function(msgId, isMe, el) {
  _msgLpTimer = setTimeout(()=>{
    if(navigator.vibrate) navigator.vibrate(40);
    const chatId = getChatId(currentUser.uid, currentChatUid);
    const msg = (chatMessages[chatId]||[]).find(m=>m.id===msgId);
    if(!msg) return;

    // 建立選單
    const menu = document.createElement('div');
    menu.id = 'chatMsgMenu';
    menu.style.cssText = 'position:fixed;inset:0;z-index:150;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0.5)';
    let btns = '';
    if(isMe==='true') {
      btns += `<div onclick="recallChatMsg('${msgId}')" style="width:100%;padding:16px;text-align:center;font-size:16px;border-bottom:0.5px solid var(--border);cursor:pointer;color:var(--red)">收回訊息</div>`;
    }
    btns += `<div onclick="deleteChatMsg('${msgId}')" style="width:100%;padding:16px;text-align:center;font-size:16px;border-bottom:0.5px solid var(--border);cursor:pointer;color:var(--red)">刪除訊息（只有自己看不到）</div>`;
    btns += `<div onclick="closeChatMenu()" style="width:100%;padding:16px;text-align:center;font-size:16px;cursor:pointer;color:var(--muted)">取消</div>`;
    menu.innerHTML = `<div style="background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px">${btns}</div>`;
    menu.onclick = (e)=>{ if(e.target===menu) closeChatMenu(); };
    document.body.appendChild(menu);
  }, 550);
};
window.cancelMsgLongPress = function() {
  if(_msgLpTimer){ clearTimeout(_msgLpTimer); _msgLpTimer=null; }
};
window.closeChatMenu = function() {

window.sendChatMedia = function(kind) {
  const inp = document.getElementById('photoInput');
  inp.accept = kind==='video' ? 'video/*' : 'image/*';
  inp.multiple = false;
  inp.onchange = async function(e) {
    const file = e.target.files[0]; if(!file) return;
    const chatId = getChatId(currentUser.uid, currentChatUid);
    let data;
    if(kind==='video') {
      data = await new Promise(res=>{ const r=new FileReader(); r.onload=ev=>res(ev.target.result); r.readAsDataURL(file); });
    } else {
      // 照片也壓縮，避免太大
      data = await compressImage(file);
    }
    const msgData = {from:currentUser.uid, t:Date.now(), readBy:{}};
    if(kind==='video') msgData.video = data;
    else msgData.img = data;
    await addDoc(collection(db,'chats',chatId,'messages'), msgData);
    e.target.value='';
    // 滾到底部
    setTimeout(()=>{ const el=document.getElementById('chatMessages'); if(el) el.scrollTop=el.scrollHeight; },100);
  };
  inp.click();
};

window.saveChatMedia = async function(src, type) {
  try {
    // 轉成 blob
    const res = await fetch(src);
    const blob = await res.blob();
    const fileName = type==='video' ? 'video.mp4' : 'photo.jpg';
    const file = new File([blob], fileName, {type: blob.type});

    if(navigator.canShare && navigator.canShare({files:[file]})) {
      // iOS/Android：用分享選單，可以選「儲存到照片」
      await navigator.share({files:[file], title:fileName});
    } else {
      // 桌面：直接下載
      const a = document.createElement('a');
      a.href = src;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  } catch(e) {
    if(e.name !== 'AbortError') alert('儲存失敗，請長按照片後選擇儲存');
  }
};

window.shareChatMedia = function(src, type) {
  if(navigator.share) {
    fetch(src).then(r=>r.blob()).then(blob=>{
      const file = new File([blob], type==='video'?'video.mp4':'photo.jpg', {type: blob.type});
      navigator.share({files:[file]}).catch(()=>{});
    }).catch(()=>{ navigator.share({text:'分享媒體'}).catch(()=>{}); });
  } else {
    saveChatMedia(src, type);
  }
};

window.addMediaType = function(id, type, mediaKind) {
  const inp = document.getElementById('photoInput');
  inp.accept = mediaKind === 'video' ? 'video/*' : 'image/*';
  inp.multiple = true;
  inp.onchange = async function(e) {
    const files = Array.from(e.target.files);
    if(!files.length) return;
    let done = 0;
    const showP = () => {
      document.getElementById('pageContent').innerHTML =
        `<div class="loading">壓縮中 ${done} / ${files.length}...<br><span style="font-size:12px;color:var(--muted)">請稍候</span></div>`;
    };
    showP();
    // 平行壓縮
    const newData = await Promise.all(files.map(async f => {
      let d;
      if(f.type.startsWith('video/')) {
        d = await new Promise(res=>{ const r=new FileReader(); r.onload=ev=>res(ev.target.result); r.readAsDataURL(f); });
      } else { d = await compressImage(f); }
      done++; showP(); return d;
    }));

    document.getElementById('pageContent').innerHTML =
      `<div class="loading">儲存中...<br><span style="font-size:12px;color:var(--muted)">請稍候</span></div>`;

    const colName = type==='item' ? 'items' : 'shopItems';
    const arr = type==='item' ? items : shopItems;
    const item = arr.find(i=>i.id===id);
    if(item) {
      // 先確保 item.id 存在
      if(!item.id || item.id.length <= 5) await saveItemMainDoc(item, colName);
      // 追加照片到子集合（不刪舊的）
      await appendPhotosToCol(currentUser.uid, colName, item.id, newData);
      // 更新記憶體
      if(!item.photos) item.photos = [];
      item.photos.push(...newData);
      // 更新 photoCount
      await saveItemMainDoc(item, colName);
    }
    e.target.value = '';
    render();
  };
  inp.click();
};

// ===== 貼上文字解析營業時間 =====

function parseChineseTime(str) {
  if(!str) return '';
  str = str.trim();
  if(/午夜/.test(str)) return '00:00';
  if(/^中午$/.test(str)) return '12:00';
  if(/凌晨/.test(str)) {
    const m = str.match(/(\d{1,2})(?::(\d{2}))?/);
    if(!m) return '';
    return `${String(parseInt(m[1])).padStart(2,'0')}:${m[2]||'00'}`;
  }
  const isPM = /下午|晚/.test(str);
  const isAM = /上午/.test(str);
  const m = str.match(/(\d{1,2})(?::(\d{2}))?(?:\s*[時时])?/);
  if(!m) return '';
  let h = parseInt(m[1]), min = m[2] ? parseInt(m[2]) : 0;
  if(isPM && h < 12) h += 12;
  if(isAM && h === 12) h = 0;
  return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}

function fixAmbiguousTime(open, close, raw) {
  if(open && close && !/[上下]午|晚|午夜|凌晨|中午/.test(raw||'')) {
    const oh = parseInt(open.split(':')[0]);
    const ch = parseInt(close.split(':')[0]);
    // 只有當開始時間很小（<8）才推斷為下午，避免把11:30誤判為23:30
    if((ch > 12 || ch === 0) && oh < 8) return `${oh+12}:${open.split(':')[1]}`;
  }
  return open;
}

// 文字前處理：統一各種破折號、全形符號，並把 tab 展開為換行
function normalizeText(text) {
  return text
    .replace(/[－ー−‐‑‒–—―]/g, '-') // 統一所有破折號
    .replace(/　/g, ' ')              // 全形空格
    .replace(/（/g, '(').replace(/）/g, ')') // 全形括號
    .replace(/\t/g, '\n');            // tab 變換行，讓同行的星期+時間/休息被分開處理
}

function parseHoursFromText(rawText) {
  const text = normalizeText(rawText);
  // 先把每行再拆分：有時候星期和時間在同一行（空格分隔）
  const rawLines = text.split(/[\n\r]+/).map(l=>l.trim()).filter(l=>l.length>0);
  const lines = [];
  const dayRegex = /星期[一二三四五六日天]|週[一二三四五六日天]|周[一二三四五六日天]/;
  const TP = '(中午|[上下]午\\s*\\d{1,2}(?::\\d{2})?(?:\\s*[時时])?|午夜|凌晨\\s*\\d{1,2}(?::\\d{2})?(?:\\s*[時时])?|\\d{1,2}:\\d{2})';
  const timeReg = new RegExp(TP + '\\s*-\\s*' + TP);
  const CLOSED = /公休|休息中|休息|不營業|已關閉/;

  for(const line of rawLines) {
    // 若同一行有星期又有時間/休息，拆成兩行
    if(dayRegex.test(line) && (timeReg.test(line) || CLOSED.test(line))) {
      const dayM = line.match(dayRegex);
      lines.push(dayM[0]); // 星期單獨一行
      const rest = line.replace(dayRegex,'').trim();
      if(rest) lines.push(rest); // 剩餘部分單獨一行
    } else {
      lines.push(line);
    }
  }

  const SKIP = /新增或編輯|評論|最新動態|關於|菜單|相片|總覽|展開/;

  // 偵測格式：交錯 vs 星期全在前
  let firstDay = false, format = 'interleaved';
  for(const line of lines) {
    if(SKIP.test(line)) continue;
    if(dayRegex.test(line)) {
      if(firstDay) { format = 'days-first'; break; }
      firstDay = true;
    } else if(firstDay && (timeReg.test(line) || CLOSED.test(line))) {
      format = 'interleaved'; break;
    }
  }

  return format === 'interleaved'
    ? parseInterleaved(lines, dayRegex, timeReg, SKIP, CLOSED)
    : parseDaysFirst(lines, dayRegex, timeReg, SKIP, CLOSED);
}

// 格式二：星期和時間交錯排列（支援成對對應）
function parseInterleaved(lines, dayRegex, timeReg, SKIP, CLOSED) {
  CLOSED = CLOSED || /公休|休息中|休息|不營業|已關閉/;
  const results = [], dayOrder = [], daysData = {};

  // 第一步：把所有行解析成結構化列表
  const tokens = [];
  for(const line of lines) {
    if(SKIP.test(line)) continue;
    const dayM = line.match(dayRegex);
    if(dayM) {
      tokens.push({type:'day', day:dayM[0]});
    } else if(timeReg.test(line)) {
      const m = line.match(timeReg);
      let open = parseChineseTime(m[1]);
      const close = parseChineseTime(m[2]);
      open = fixAmbiguousTime(open, close, m[1]);
      if(open && close) tokens.push({type:'time', open, close});
    } else if(CLOSED.test(line)) {
      tokens.push({type:'closed'});
    } else if(/營業時間可能不同/.test(line)) {
      tokens.push({type:'note', note:'營業時間可能不同'});
    }
  }

  // 第二步：處理 tokens
  let i = 0;
  while(i < tokens.length) {
    if(tokens[i].type !== 'day') { i++; continue; }

    // 收集連續的星期
    const days = [];
    while(i < tokens.length && tokens[i].type === 'day') {
      const d = tokens[i].day;
      if(!daysData[d]) { daysData[d]={slots:[],closed:false,note:''}; dayOrder.push(d); }
      days.push(d);
      i++;
    }

    if(days.length === 1) {
      // 單一星期：收集後面所有非星期的 token
      const day = days[0];
      while(i < tokens.length && tokens[i].type !== 'day') {
        const t = tokens[i];
        if(t.type==='time' && !daysData[day].closed) daysData[day].slots.push({open:t.open,close:t.close});
        else if(t.type==='closed') { daysData[day].closed=true; daysData[day].note='公休'; }
        else if(t.type==='note' && !daysData[day].closed) daysData[day].note=t.note;
        i++;
      }
    } else {
      // 多個連續星期：後面的 token 一對一對應
      // time/closed 對應到各星期（各占一個），note 貼到前一個
      let dayIdx = 0;
      while(i < tokens.length && tokens[i].type !== 'day') {
        if(dayIdx >= days.length) { i++; continue; }
        const t = tokens[i];
        const day = days[dayIdx];
        if(t.type==='time') {
          if(!daysData[day].closed) daysData[day].slots.push({open:t.open,close:t.close});
          dayIdx++; i++;
        } else if(t.type==='closed') {
          daysData[day].closed=true; daysData[day].note='公休';
          dayIdx++; i++;
        } else if(t.type==='note') {
          // note 貼到前一個星期（剛剛處理完的那個）
          const prevDay = dayIdx > 0 ? days[dayIdx-1] : day;
          if(!daysData[prevDay].closed) daysData[prevDay].note=t.note;
          i++;
          // 不推進 dayIdx
        } else {
          i++;
        }
      }
    }
  }

  dayOrder.forEach(day => {
    const d = daysData[day];
    if(d.closed || !d.slots.length) results.push({days:day,open:'',close:'',note:d.note||'公休'});
    else d.slots.forEach(s=>results.push({days:day,open:s.open,close:s.close,note:d.note}));
  });
  return results;
}

// 格式一：星期全在前，時間全在後
function parseDaysFirst(lines, dayRegex, timeReg, SKIP, CLOSED) {
  CLOSED = CLOSED || /公休|休息中|休息|不營業|已關閉/;
  const results = [], dayNames = [], groups = [];
  let curTimes = [], foundFirstTime = false;
  for(const line of lines) {
    if(SKIP.test(line)) continue;
    if(!foundFirstTime) {
      if(timeReg.test(line) || /公休|休息中/.test(line)) foundFirstTime = true;
      else if(dayRegex.test(line)) { dayNames.push(line.match(dayRegex)[0]); continue; }
      else continue;
    }
    if(/營業時間可能不同/.test(line)) {
      if(curTimes.length) { groups.push({times:[...curTimes],note:'營業時間可能不同'}); curTimes=[]; }
      else if(groups.length) groups[groups.length-1].note='營業時間可能不同';
    } else if(CLOSED.test(line)) {
      if(curTimes.length) { groups.push({times:[...curTimes],note:''}); curTimes=[]; }
      groups.push({times:[],note:'公休'});
    } else if(timeReg.test(line)) {
      const m = line.match(timeReg);
      let open = parseChineseTime(m[1]);
      const close = parseChineseTime(m[2]);
      open = fixAmbiguousTime(open, close, m[1]);
      if(open && close) curTimes.push({open, close});
    }
  }
  if(curTimes.length) {
    const rem = dayNames.length - groups.length;
    if(rem > 0 && curTimes.length % rem === 0) {
      const s = curTimes.length/rem;
      for(let i=0;i<curTimes.length;i+=s) groups.push({times:curTimes.slice(i,i+s),note:''});
    } else groups.push({times:curTimes,note:''});
  }
  dayNames.forEach((day,i) => {
    const g = groups[i]; if(!g) return;
    if(!g.times.length) results.push({days:day,open:'',close:'',note:g.note||'公休'});
    else g.times.forEach(t=>results.push({days:day,open:t.open,close:t.close,note:g.note}));
  });
  return results;
}

    <div class="emoji-grid" id="epick">${catEmojis.map(e=>`<span class="emoji-opt${e===pickEmoji?' sel':''}" onclick="pickE('${e}')">${e}</span>`).join('')}</div>
    <input class="modal-input" id="mName" placeholder="分類名稱（例：保養品）"/>
    <div class="modal-btns">
      <div class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</div>
      <div class="modal-btn modal-btn-ok" onclick="doAddShopCat()">新增</div>
    </div>`);
};

window.doAddShopCat = async function() {
  const name = document.getElementById('mName').value.trim(); if(!name) return;
  shopCats.push({id:'sc_'+Date.now(),label:name,emoji:pickEmoji});
  await saveUserData(); closeModal(); render();
};

window.deleteShopCat = async function(id) {
  if(!confirm('確定刪除此分類？')) return;
  shopCats = shopCats.filter(c=>c.id!==id);
  await saveUserData(); closeModal(); render();
};

// ===== SWIPER =====
function initSwipers() {
  document.querySelectorAll('.photo-swiper').forEach(sw=>{
    const track = sw.querySelector('.photo-swiper-track'); if(!track) return;
    const count = parseInt(sw.dataset.count)||0;
    const itemId = sw.dataset.id;
    let idx=0, startX=0, startY=0, startTime=0, wasSwiped=false;

    function goTo(i) {
      if(i<0)i=0; if(i>=count)i=count-1;
      idx=i; sw.dataset.idx=i;
      track.style.transform=`translateX(-${i}00%)`;
      sw.querySelectorAll('.photo-dot').forEach((d,di)=>d.classList.toggle('on',di===i));
      const badge=sw.querySelector('.photo-count'); if(badge) badge.textContent=`${i+1} / ${count}`;
    }

    function tryOpenLightbox(target) {
      const isBtn = target.closest('.photo-add-btn')||target.closest('.photo-del-btn')||target.closest('.photo-btn-row');
      if(!isBtn && count>0) {
        setTimeout(()=>openLightbox(itemId, idx), 10);
      }
    }

    // 手機 touch
    let touchHandled = false;
    sw.addEventListener('touchstart',e=>{
      startX=e.touches[0].clientX;
      startY=e.touches[0].clientY;
      startTime=Date.now();
      wasSwiped=false;
      touchHandled=false;
    },{passive:true});

    sw.addEventListener('touchend',e=>{
      const dx=startX-e.changedTouches[0].clientX;
      const dy=Math.abs(e.changedTouches[0].clientY-startY);
      const dt=Date.now()-startTime;
      if(Math.abs(dx)>40 && dy<60){
        wasSwiped=true;
        if(dx>0)goTo(idx+1);else goTo(idx-1);
      } else if(Math.abs(dx)<15 && dy<15 && dt<400){
        touchHandled=true;
        tryOpenLightbox(e.target);
      }
    },{passive:true});

    // 電腦 click (方便測試)
    sw.addEventListener('click',e=>{
      if(wasSwiped){wasSwiped=false;return;}
      if(touchHandled){touchHandled=false;return;}
      tryOpenLightbox(e.target);
    });
  });
}

function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Show loading initially
document.getElementById('pageContent').innerHTML = '<div class="loading">載入中...</div>';
</script>
